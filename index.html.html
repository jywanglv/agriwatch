<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AgriWatch">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="農產品期貨看盤 — 玉米、黃豆、小麥、咖啡等即時報價與技術分析">
<link rel="manifest" href="manifest.json">
<title>AgriWatch Pro</title>
<!-- TradingView Lightweight Charts（K線縮放卷動）-->
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --fn:'Microsoft JhengHei','微軟正黑體','Noto Sans HK',sans-serif;
  --fnum:'Noto Sans HK',sans-serif;
  --fmono:'Consolas','Courier New',monospace;
  --bg:#07090c;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2330;
  --bd:#21262d;--bd2:#30363d;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;
  --g:#f85149;--r:#3fb950;--y:#f0c644;--b:#388bfd;--c:#58a6ff;
  --act-bg:#1a3a5c;--act-bd:#2d6db5;--act-tx:#a8d4ff;--act-shadow:0 2px 6px rgba(45,109,181,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:12px;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── 顏色 ── */
.up{color:var(--g)}.dn{color:var(--r)}.fl{color:var(--tx3)}

/* ── 新頂端選單列（分類+商品+報價，兩行）── */
#r-nav{background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
/* 第一行：分類標籤 */
#r-cats{display:flex;align-items:center;padding:5px 10px;gap:2px;border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
#r-cats::-webkit-scrollbar{display:none}
.cat-pill{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;font-family:var(--fn);color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid transparent}
.cat-pill:hover{color:var(--tx);border-color:var(--act-bd);background:rgba(45,109,181,.1)}
.cat-pill.on{background:var(--act-bg);color:var(--act-tx);border-color:var(--act-bd);font-weight:700;box-shadow:var(--act-shadow);text-shadow:0 0 8px rgba(168,212,255,.3)}
.cat-sep-v{width:1px;height:14px;background:var(--bd2);margin:0 4px;flex-shrink:0}
/* 第二行：商品按鈕 */
#r-syms{display:flex;align-items:center;padding:6px 10px;gap:5px;overflow-x:auto;scrollbar-width:none;min-height:52px}
#r-syms::-webkit-scrollbar{display:none}
.sym-btn{display:inline-flex;flex-direction:column;align-items:flex-start;padding:5px 11px;border-radius:6px;border:1px solid var(--bd);cursor:pointer;transition:all .15s;flex-shrink:0;background:var(--bg3);min-width:78px}
.sym-btn:hover{border-color:var(--act-bd);background:rgba(45,109,181,.1);transform:translateY(-1px)}
.sym-btn.active{border-color:var(--act-bd);background:var(--act-bg);box-shadow:var(--act-shadow),inset 0 1px 0 rgba(168,212,255,.15);transform:translateY(-1px)}
.sym-btn-top{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;line-height:1.3}
.sym-btn-bot{display:flex;align-items:center;gap:4px;margin-top:1px}
.sym-price{font-family:var(--fnum);font-size:12px;font-weight:900;color:var(--tx)}
.sym-chg{font-family:var(--fnum);font-size:10px;font-weight:700}
.ic-badge{font-family:var(--fmono);font-size:9px;font-weight:700;color:var(--tx3);background:var(--bg4);padding:1px 4px;border-radius:2px;border:1px solid var(--bd2);letter-spacing:0;line-height:1.2;flex-shrink:0}
.sym-btn.active .ic-badge{color:var(--act-tx);background:rgba(45,109,181,.2);border-color:var(--act-bd)}

/* ── TOPBAR ── */
#r-topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#r-topbar::-webkit-scrollbar{display:none}
.logo{font-family:var(--fmono);font-size:12px;font-weight:700;color:var(--y);letter-spacing:2px;flex-shrink:0}
.logo span{color:var(--tx3);font-weight:300}
#qh-name{font-family:var(--fn);font-size:18px;font-weight:700;flex-shrink:0;white-space:nowrap;letter-spacing:.3px}
#qh-price{font-family:var(--fnum);font-size:26px;font-weight:900;line-height:1;flex-shrink:0}
#qh-chg{font-family:var(--fnum);font-size:13px;font-weight:700;padding:3px 10px;border-radius:4px;flex-shrink:0}
#qh-chg.up{background:rgba(248,81,73,.15);color:var(--g)}
#qh-chg.dn{background:rgba(63,185,80,.15);color:var(--r)}
.qh-sep{width:1px;height:26px;background:var(--bd2);margin:0 4px;flex-shrink:0}
.qh-kv{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.qh-k{font-size:8px;color:var(--tx3);font-family:var(--fmono);text-transform:uppercase;white-space:nowrap}
.qh-v{font-family:var(--fnum);font-size:12px;font-weight:700;white-space:nowrap}
.tsp{flex:1;min-width:8px}
#clock{font-family:var(--fmono);font-size:10px;color:var(--tx2);flex-shrink:0}
.mkt-b{font-size:9px;font-family:var(--fmono);padding:2px 8px;border-radius:3px;flex-shrink:0}
.mkt-b.open{background:rgba(63,185,80,.15);color:var(--g)}
.mkt-b.closed{background:rgba(72,79,88,.2);color:var(--tx3)}
.hdr-btn{background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);padding:3px 10px;border-radius:4px;cursor:pointer;font-family:var(--fn);font-size:10px;transition:all .1s;flex-shrink:0;white-space:nowrap}
.hdr-btn:hover{color:var(--act-tx);border-color:var(--act-bd);background:var(--act-bg)}

/* ── WORKSPACE ── */
#workspace{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── CENTER ── */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}

/* 合約列 */
#r-contract{height:28px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:4px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#r-contract::-webkit-scrollbar{display:none}
.cr-lbl{font-size:9px;color:var(--tx3);font-family:var(--fmono);flex-shrink:0}
.cr-btn{background:transparent;border:1px solid var(--bd);color:var(--tx3);padding:2px 9px;border-radius:3px;cursor:pointer;font-family:var(--fmono);font-size:9px;white-space:nowrap;transition:all .1s;flex-shrink:0}
.cr-btn:hover{color:var(--tx);border-color:var(--bd2)}
.cr-btn.active{background:var(--act-bg);border-color:var(--act-bd);color:var(--act-tx);font-weight:700;box-shadow:var(--act-shadow)}

/* 圖表工具列 */
#r-toolbar{height:34px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:5px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#r-toolbar::-webkit-scrollbar{display:none}
.tb-sep{width:1px;height:16px;background:var(--bd2);margin:0 3px;flex-shrink:0}
.tb-lbl{font-size:9px;color:var(--tx3);font-family:var(--fmono);white-space:nowrap;flex-shrink:0}
.tb-btn{background:transparent;border:1px solid transparent;color:var(--tx3);padding:2px 8px;border-radius:3px;cursor:pointer;font-family:var(--fmono);font-size:10px;white-space:nowrap;transition:all .12s;flex-shrink:0}
.tb-btn:hover{color:var(--tx);border-color:var(--bd)}
.tb-btn.on{background:var(--bg4);border-color:var(--bd2);color:var(--tx)}
.ct-btn{background:transparent;border:1px solid var(--bd);color:var(--tx3);padding:2px 9px;border-radius:3px;cursor:pointer;font-family:var(--fmono);font-size:10px;white-space:nowrap;transition:all .12s;flex-shrink:0}
.ct-btn.on{background:rgba(88,166,255,.12);border-color:var(--c);color:var(--c)}
.ct-btn:hover{border-color:var(--bd2);color:var(--tx)}
.ma-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;border:1px solid var(--bd);cursor:pointer;font-family:var(--fmono);font-size:9px;transition:all .12s;flex-shrink:0;white-space:nowrap}
.ma-chip.on{border-color:var(--bd2);background:var(--bg4);color:var(--tx);font-weight:700;box-shadow:inset 0 -2px 0 var(--act-bd)}
.ma-chip:hover{border-color:var(--bd2)}
.ma-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sub-sel{background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);padding:2px 6px;border-radius:3px;font-family:var(--fmono);font-size:10px;cursor:pointer;outline:none;flex-shrink:0}
.sub-sel:focus{border-color:var(--c)}
.sub-sel option{background:var(--bg3)}

/* 圖表主區 */
#r-charts{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:6px 10px;gap:4px;min-height:0}
.pane{position:relative;background:var(--bg);border:1px solid var(--bd);border-radius:4px;overflow:hidden;min-height:0}
#pane-main{flex:1}
#pane-sub1{flex:0 0 110px}
#pane-sub2{flex:0 0 100px}
.pane-lbl{position:absolute;top:4px;left:6px;font-family:var(--fmono);font-size:9px;color:var(--tx3);z-index:5;pointer-events:none;background:rgba(7,9,12,.8);padding:1px 6px;border-radius:2px;white-space:nowrap}

/* 縮放控制 */
.zoom-ctrl{position:absolute;top:4px;right:8px;display:flex;gap:3px;z-index:5}
.zoom-btn{background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);width:20px;height:20px;border-radius:3px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .1s;line-height:1}
.zoom-btn:hover{color:var(--act-tx);border-color:var(--act-bd);background:var(--act-bg)}

/* sub chart canvas */
.sub-canvas-wrap{position:relative;width:100%;height:100%;display:block}
.sub-canvas-wrap canvas{display:block}

/* ── RIGHT PANEL ── */
#r-right{width:258px;background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.rp-tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.rp-tab{flex:1;padding:8px 2px;text-align:center;font-size:12px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;font-family:var(--fn)}
.rp-tab.on{color:var(--act-tx);border-bottom-color:var(--act-bd);font-weight:700}
.rp-tab:hover{color:var(--tx);background:rgba(45,109,181,.06)}
#rp-body{flex:1;overflow-y:auto;padding:12px 14px}

/* 右欄元件 */
.ai-card{background:linear-gradient(135deg,rgba(45,109,181,.08),rgba(56,139,253,.04));border:1px solid rgba(45,109,181,.3);border-radius:6px;padding:10px;margin-bottom:10px}
.ai-t{font-size:12px;font-weight:700;color:var(--act-tx);margin-bottom:6px}
.ai-b{font-size:12px;line-height:1.8;color:var(--tx2)}
.sig-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.sig{font-size:10px;font-weight:600;padding:2px 9px;border-radius:3px;font-family:var(--fn)}
.sig.bull{background:rgba(248,81,73,.15);color:var(--g)}
.sig.bear{background:rgba(63,185,80,.15);color:var(--r)}
.sig.watch{background:rgba(240,198,68,.12);color:var(--y)}
.sig.neutral{background:rgba(139,148,158,.1);color:var(--tx2)}
.news-item{padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:rgba(45,109,181,.07);margin:0 -10px;padding:8px 10px;border-left:2px solid var(--act-bd)}
.n-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;margin-bottom:4px;display:inline-block;font-family:var(--fn)}
.n-tag.bull{background:rgba(248,81,73,.15);color:var(--g)}
.n-tag.bear{background:rgba(63,185,80,.15);color:var(--r)}
.n-tag.neutral{background:rgba(139,148,158,.1);color:var(--tx2)}
.n-title{font-size:12px;font-weight:500;line-height:1.55;color:var(--tx);margin-bottom:3px}
.news-item:hover .n-title{color:var(--act-tx)}
.n-time{font-size:9px;color:var(--tx3);font-family:var(--fmono)}
.n-src{font-size:9px;color:var(--b);font-family:var(--fmono)}
.open-link{font-size:9px;color:var(--c);float:right;padding:2px 6px;border:1px solid rgba(88,166,255,.3);border-radius:2px;font-family:var(--fmono);text-decoration:none;display:inline-block}
.open-link:hover{background:rgba(88,166,255,.1);color:var(--c)}
.wasde-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-family:var(--fn);font-size:12px}
.wasde-row:last-child{border-bottom:none}
.wb{font-size:10px;font-weight:600;padding:2px 9px;border-radius:3px}
.wb.soon{background:rgba(240,198,68,.15);color:var(--y)}
.wb.today{background:rgba(248,81,73,.2);color:var(--r)}
.wb.past{color:var(--tx3)}.wb.future{color:var(--tx2)}
.psd-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px}
.psd-row:last-child{border-bottom:none}
.psd-k{color:var(--tx2);font-weight:500}.psd-v{font-family:var(--fnum);font-weight:900;color:var(--tx);font-size:12px}
.sec{font-family:var(--fmono);font-size:10px;font-weight:700;color:var(--act-tx);letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--act-bd)}
.range-wrap{margin:8px 0}
.range-lbs{display:flex;justify-content:space-between;font-family:var(--fnum);font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:3px}
.range-bar{height:5px;background:var(--bg4);border-radius:3px;position:relative;overflow:visible}
.range-fill{height:100%;border-radius:3px;transition:width .5s}
.range-mk{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;transform:translateX(-50%);transition:left .5s;border:2px solid var(--bg2)}

/* 下載按鈕 */
.dl-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:4px;border:1px solid var(--bd2);background:var(--bg3);cursor:pointer;font-size:10px;color:var(--tx2);margin-bottom:6px;transition:all .1s;width:100%}
.dl-btn:hover{border-color:var(--c);color:var(--c);background:rgba(88,166,255,.06)}

/* MA Modal */
#ma-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999}
#ma-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:18px;width:380px;z-index:1000;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.mm-t{font-size:14px;font-weight:700;color:var(--y);margin-bottom:14px;display:flex;justify-content:space-between}
.mm-x{cursor:pointer;color:var(--tx3);font-size:16px}.mm-x:hover{color:var(--tx)}
.mm-row{display:grid;grid-template-columns:32px 1fr 70px 40px 24px;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:var(--bg4);border-radius:4px}
.mm-tog{width:36px;height:20px;border-radius:10px;border:1px solid var(--bd2);cursor:pointer;transition:all .2s;position:relative;background:var(--bg2)}
.mm-tog.on{background:var(--g);border-color:var(--g)}
.mm-tog::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.mm-tog.on::after{left:18px}
.mm-inp{background:var(--bg2);border:1px solid var(--bd2);color:var(--tx);padding:4px 7px;border-radius:4px;font-family:var(--fnum);font-size:11px;font-weight:700;width:100%;outline:none}
.mm-inp:focus{border-color:var(--y)}
.mm-col{width:36px;height:24px;border:none;border-radius:3px;cursor:pointer;background:transparent}
.mm-lbl{font-size:10px;color:var(--tx2)}
.mm-btns{display:flex;gap:8px;margin-top:14px}
.mm-ok{flex:1;background:var(--y);border:none;color:#000;padding:7px;border-radius:4px;font-family:var(--fn);font-size:11px;font-weight:700;cursor:pointer}
.mm-cancel{background:var(--bg4);border:1px solid var(--bd2);color:var(--tx2);padding:7px 14px;border-radius:4px;font-family:var(--fn);font-size:11px;cursor:pointer}



/* ══════════════════════════════════════════
   手機響應式版面
   ══════════════════════════════════════════ */
@media (max-width: 768px) {
  /* 隱藏右側分析欄，改為底部抽屜 */
  #r-right { display:none }
  #workspace { flex-direction: column }

  /* 頂端報價列自動換行 */
  #r-topbar {
    height:auto; flex-wrap:wrap; padding:6px 10px; gap:5px;
    overflow-x:visible;
  }
  #qh-name { font-size:14px; width:100%; margin-bottom:2px }
  #qh-price { font-size:20px }
  #qh-chg { font-size:11px }
  .qh-kv { min-width:60px }
  .qh-k { font-size:7px }
  .qh-v { font-size:10px }
  .tsp { display:none }
  #clock { display:none }

  /* 分類列縮小 */
  .cat-pill { font-size:11px; padding:3px 10px }

  /* 商品列縮小 */
  .sym-btn { min-width:62px; padding:4px 8px }
  .sym-btn-top { font-size:11px }
  .sym-price { font-size:11px }

  /* 合約列縮小 */
  .cr-btn { font-size:9px; padding:2px 6px }

  /* 工具列自動換行 */
  #r-toolbar {
    height:auto; flex-wrap:wrap; padding:4px 8px; gap:3px;
  }
  .ct-btn { font-size:9px; padding:2px 6px }
  .sub-sel { font-size:9px }
  .tb-sep { display:none }

  /* 圖表區填滿 */
  #center { flex:1; min-height:0 }
  #r-charts { padding:4px 6px; gap:3px }
  #pane-sub1 { flex:0 0 90px }
  #pane-sub2 { flex:0 0 80px }

  /* 縮放按鈕放大（手指好點） */
  .zoom-btn { width:28px; height:28px; font-size:16px }

  /* 底部分析抽屜 */
  #mobile-drawer {
    display:flex; flex-direction:column;
    background:var(--bg2); border-top:1px solid var(--bd);
    height:0; overflow:hidden; transition:height .3s ease;
    flex-shrink:0;
  }
  #mobile-drawer.open { height:280px }
  #mobile-drawer-tabs {
    display:flex; border-bottom:1px solid var(--bd); flex-shrink:0;
  }
  .md-tab {
    flex:1; padding:8px 4px; text-align:center; font-size:11px;
    font-weight:600; color:var(--tx3); cursor:pointer;
    border-bottom:2px solid transparent; font-family:var(--fn);
  }
  .md-tab.on { color:var(--act-tx); border-bottom-color:var(--act-bd) }
  #mobile-drawer-body { flex:1; overflow-y:auto; padding:10px 12px }

  /* 底部抽屜開關按鈕 */
  #drawer-toggle {
    display:flex; align-items:center; justify-content:center;
    gap:6px; background:var(--bg2); border-top:1px solid var(--bd);
    padding:6px; cursor:pointer; flex-shrink:0;
    font-size:11px; color:var(--tx2); font-family:var(--fn);
  }
  #drawer-toggle:active { background:var(--bg3) }
  .drawer-arrow { transition:transform .3s; font-size:14px }
  #mobile-drawer.open + * .drawer-arrow,
  .drawer-arrow.up { transform:rotate(180deg) }
}

@media (min-width: 769px) {
  /* 桌面版隱藏手機元素 */
  #mobile-drawer { display:none !important }
  #drawer-toggle { display:none !important }
}
</style>
</head>
<body>

<!-- 頂端選單：分類 + 商品 + 報價 -->
<div id="r-nav">
  <div id="r-cats"></div>
  <div id="r-syms"></div>
</div>

<!-- TOPBAR + 報價 -->
<div id="r-topbar">
  <div class="logo">AGRI<span>WATCH</span></div>

function simPrice(sym){
  const b=SYM[sym]?.base||100;
  const prev=prices[sym]?.price||b;
  const p=Math.max(b*.6,prev+(Math.random()-.487)*b*.008);
  const chg=p-b; const pct=chg/b*100;
  prices[sym]={price:p,chg,pct,
    open:b*(1+(Math.random()-.5)*.004),
    high:p*(1+Math.random()*.009),
    low:p*(1-Math.random()*.009),
    high52:b*(1.09+Math.random()*.1),
    low52:b*(.82+Math.random()*.08),
    volume:Math.round(50000+Math.random()*280000),
    oi:Math.round(200000+Math.random()*750000)};
  return prices[sym];
}

function genOHLC(n,base,pd){
  const vol=pd==='1W'?.015:pd==='1M'?.025:pd==='3M'?.04:pd==='1Y'?.06:.012;
  let c=base*(.88+Math.random()*.1);
  const now=Math.floor(Date.now()/1000);
  const step=pd==='1D'?86400:pd==='1W'?604800:pd==='1M'?2592000:pd==='3M'?7776000:31536000;
  return Array.from({length:n},(_,i)=>{
    c=Math.max(base*.4,c*(1+(Math.random()-.488)*vol));
    const rng=c*(.005+Math.random()*.02);
    const o=+(c*(1+(Math.random()-.5)*.006)).toFixed(2);
    const h=+(Math.max(o,c)+Math.random()*rng).toFixed(2);
    const l=+(Math.min(o,c)-Math.random()*rng).toFixed(2);
    return{time:now-(n-1-i)*step,open:o,high:h,low:l,close:+c.toFixed(2)};
  });
}

function genVol(ohlc){
  return ohlc.map(d=>({time:d.time,value:Math.round(50000+Math.random()*280000),color:d.close>=d.open?'rgba(63,185,80,.6)':'rgba(248,81,73,.6)'}));
}

function genOI(ohlc){
  let v=200000;
  return ohlc.map(d=>{v=Math.max(50000,v*(1+(Math.random()-.47)*.03));return{time:d.time,value:Math.round(v)};});
}

function rebuildMain(){

  cachedData[activeSym][activePd]={ohlc,ts:Date.now()};

  if(chartType==='kline'){
    // 蠟燭圖
    mainSeries=lwChart.addCandlestickSeries({
      upColor:lwColors.upBody,downColor:lwColors.downBody,
      borderUpColor:lwColors.upBorder,borderDownColor:lwColors.downBorder,
      wickUpColor:lwColors.wickUp,wickDownColor:lwColors.wickDown,
    });
    mainSeries.setData(ohlc);
  } else if(chartType==='ohlc'){
    // OHLC 美式線圖（Bar Series）
    mainSeries=lwChart.addBarSeries({
      upColor:lwColors.upBorder,
      downColor:lwColors.downBorder,
    });
    mainSeries.setData(ohlc);
  } else {
    // 收盤線
    const isUp=ohlc[ohlc.length-1].close>=ohlc[0].close;
    mainSeries=lwChart.addLineSeries({color:isUp?'#f85149':'#3fb950',lineWidth:1.5,priceLineVisible:false});
    mainSeries.setData(ohlc.map(d=>({time:d.time,value:d.close})));
  }

  // MA 線
  maConfig.forEach(ma=>{
    if(!ma.on) return;
    const closes=ohlc.map(d=>d.close);
    const maData=ohlc.map((d,i)=>{
      if(i<ma.p-1) return null;
      const avg=closes.slice(i-ma.p+1,i+1).reduce((a,b)=>a+b,0)/ma.p;
      return{time:d.time,value:+avg.toFixed(info.dec)};
    }).filter(Boolean);
    const s=lwChart.addLineSeries({color:ma.c,lineWidth:1,priceLineVisible:false,lastValueVisible:false});
    s.setData(maData);
    maSeries.push(s);
  });

  // 標籤
  const maLbls=maConfig.filter(m=>m.on).map(m=>`<span style="color:${m.c}">MA${m.p}</span>`).join(' ');
  document.getElementById('lbl-main').innerHTML=`<b>${info.n}</b> ${info.unit} &nbsp;${maLbls}`;
  lwChart.timeScale().fitContent();

  // 同步副圖用同一份 ohlc（延遲確保主圖 render 完成）
  window._lastOHLC=ohlc;
  setTimeout(()=>{ rebuildSub(1); rebuildSub(2); }, 50);
}

function zoomChart(factor){
  if(!lwChart) return;
  const ts=lwChart.timeScale();
  const vr=ts.getVisibleLogicalRange();
  if(!vr) return;
  const mid=(vr.from+vr.to)/2;
  const half=(vr.to-vr.from)/2/factor;
  ts.setVisibleLogicalRange({from:mid-half,to:mid+half});
}

// 產生符合真實規律的模擬成交量（日均35萬口，有季節波動）
function genSimVol(ohlc){
  const base = 350000;
  return ohlc.map((d,i)=>{
    const dayOfWeek = new Date(d.time*1000).getDay();
    const weekMult = (dayOfWeek===1||dayOfWeek===5)?1.3:(dayOfWeek===3)?1.1:1.0;
    const trend = 1 + Math.sin(i/20)*0.15;
    const noise = 0.7 + Math.random()*0.6;
    return Math.round(base * weekMult * trend * noise);
  });
}
// 產生符合真實規律的模擬 OI（週頻 CFTC，平滑趨勢）
function genSimOI(ohlc){
  let v = 1200000 + Math.random()*400000;
  return ohlc.map((d,i)=>{
    const trend = Math.sin(i/30)*0.08;
    const noise = (Math.random()-0.47)*0.025;
    v = Math.max(400000, v*(1+trend*0.1+noise));
    return Math.round(v);
  });
}

function calcSubData(type,ohlc){
  const closes=ohlc.map(d=>d.close), n=closes.length;
  if(type==='vol'){
    const vols = genSimVol(ohlc);
    return{data:ohlc.map((d,i)=>({v:vols[i],c:d.close>=d.open?'rgba(248,81,73,.65)':'rgba(63,185,80,.65)'})),
      lbl:'成交量（模擬，CME ZC 日均35萬口）',isBar:true};}
  if(type==='oi'){
    const ois = genSimOI(ohlc);
    return{data:ois.map(v=>({v,c:'#58a6ff'})),
      lbl:'未平倉量（模擬趨勢，實際數據請參考 CME/CFTC）',isBar:false,color:'#58a6ff'};}
  if(type==='oi_chg'){
    const ois=genSimOI(ohlc);
    return{data:ois.map((x,i)=>({v:i===0?0:+((x-ois[i-1])/ois[i-1]*100).toFixed(3),c:i===0||x>=ois[i-1]?'rgba(63,185,80,.7)':'rgba(248,81,73,.7)'})),
      lbl:'OI變化率%（模擬）',isBar:true};}
  if(type==='vol_chg'){
    const vs=genSimVol(ohlc);
    return{data:vs.map((x,i)=>({v:i===0?0:+((x-vs[i-1])/vs[i-1]*100).toFixed(2),c:i===0||x>=vs[i-1]?'rgba(63,185,80,.7)':'rgba(248,81,73,.7)'})),
      lbl:'量變化率%（模擬）',isBar:true};}
  if(type==='rsi'){
    const p=14; const gs=[],ls=[];
    for(let i=1;i<n;i++){const d=closes[i]-closes[i-1];gs.push(d>0?d:0);ls.push(d<0?-d:0);}
    const rsi=[null];
    for(let i=0;i<gs.length;i++){
      if(i<p-1){rsi.push(null);continue;}
      const ag=gs.slice(i-p+1,i+1).reduce((a,b)=>a+b)/p;
      const al=ls.slice(i-p+1,i+1).reduce((a,b)=>a+b)/p;
      rsi.push(al===0?100:+(100-100/(1+ag/al)).toFixed(2));
    }
    return{data:rsi.map(v=>({v,c:'#f0c644'})),lbl:'RSI(14)',isBar:false,color:'#f0c644',refs:[70,50,30]};}
  if(type==='macd'){
    const ema=(arr,p)=>{const k=2/(p+1);let e=arr[0];return arr.map(v=>{e=v*k+e*(1-k);return+e.toFixed(4);});};
    const e12=ema(closes,12),e26=ema(closes,26);
    const ml=e12.map((v,i)=>+(v-e26[i]).toFixed(4));
    const sg=ema(ml,9);
    const hist=ml.map((v,i)=>+(v-sg[i]).toFixed(4));
    return{data:hist.map((v,i)=>({v,c:v>=0?'rgba(248,81,73,.7)':'rgba(63,185,80,.7)'})),lbl:'MACD直方圖',isBar:true,
      extra:[{data:ml,color:'#58a6ff',lbl:'MACD'},{data:sg,color:'#f0c644',lbl:'Signal'}]};}
  if(type==='atr'){
    const atr=[null];
    for(let i=1;i<n;i++){
      const tr=Math.max(ohlc[i].high-ohlc[i].low,Math.abs(ohlc[i].high-closes[i-1]),Math.abs(ohlc[i].low-closes[i-1]));
      if(i<14){atr.push(null);continue;}
      const prev=atr[atr.length-1]||tr;
      atr.push(+((prev*13+tr)/14).toFixed(4));
    }
    return{data:atr.map(v=>({v,c:'#ff7b54'})),lbl:'ATR(14)',isBar:false,color:'#ff7b54'};}
  return null;
}

  const ctx = newCanvas.getContext('2d');
  const datasets = [];

  if(res.isBar){
    datasets.push({
      type:'bar', label:res.lbl,
      data: res.data.map(d => d.v==null?null:d.v),
      backgroundColor: res.data.map(d => d.c||'rgba(88,166,255,.6)'),
      borderRadius:2, barPercentage:0.8
    });
  } else {
    const color = res.color||'#58a6ff';
    const grad = ctx.createLinearGradient(0,0,0,100);
    grad.addColorStop(0, color+'44');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    datasets.push({
      type:'line', label:res.lbl,
      data: res.data.map(d => d.v==null?null:d.v),
      borderColor:color, backgroundColor:grad,
      fill:true, tension:.3, borderWidth:1.5, pointRadius:0,
      spanGaps:false
    });

  if(res.extra){

        type:'line', label:e.lbl, data:e.data,

        fill:false, tension:.3, borderWidth:1, pointRadius:0
      });
    });

  const opts = {
    responsive:false, maintainAspectRatio:false,
    animation:{duration:300},
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'#0d1117', borderColor:'#21262d', borderWidth:1,
        titleColor:'#8b949e', bodyColor:'#e6edf3',
        titleFont:{family:'Consolas',size:9}, bodyFont:{family:'Consolas',size:9},
        callbacks:{
          label: ctx => {
            const v = ctx.raw;
            if(v==null) return '';
            return res.lbl+': '+(Math.abs(v)>=1000?fmtI(Math.round(v)):v.toFixed(2));
          }
        }
      }
    },
    scales:{
      x:{ display:false },
      y:{
        grid:{color:'rgba(33,38,45,.6)'},
        ticks:{color:'#484f58', font:{family:'Consolas',size:9}, callback:v=>fmtK(v)},
        position:'right'
      }
    }
  };

  if(res.refs){
    // RSI 參考線用 afterDraw plugin
  }

  subCharts[idx] = new Chart(ctx, {type:'bar', data:{labels, datasets}, options:opts});
  // 確保在視窗 resize 時副圖也更新
  subCharts[idx]._paneIdx = idx;
}

function rebuildAll(){
  try{ rebuildMain(); }
  catch(e){ console.warn('rebuildMain error:',e); initLWChart(); rebuildMain(); }

// 資料儲存（localStorage + JSON匯出）
// ══════════════════════════════════════════════════
function saveData(){
  try{
    const saveObj={prices,cachedData,savedAt:new Date().toISOString(),version:'v4'};
    localStorage.setItem('agriwatch_data',JSON.stringify(saveObj));
    alert(`✅ 資料已儲存！\n時間：${saveObj.savedAt}\n下次無網路時可載入使用。`);
  }catch(e){alert('儲存失敗：'+e.message);}
}
function loadData(){
  try{
    const raw=localStorage.getItem('agriwatch_data');
    if(!raw){alert('找不到本地儲存資料，請先儲存。');return;}
    const obj=JSON.parse(raw);
    prices=obj.prices||prices;
    cachedData=obj.cachedData||cachedData;
    buildNav();selectSym(activeSym);
    alert(`✅ 已載入本地資料！\n儲存時間：${obj.savedAt||'未知'}`);
  }catch(e){alert('載入失敗：'+e.message);}
}
function exportCSV(){
  const ohlc=cachedData[activeSym]?.[activePd]?.ohlc;
  if(!ohlc){alert('請先切換圖表週期以生成數據');return;}
  const rows=['日期,開盤,最高,最低,收盤'].concat(
    ohlc.map(d=>`${new Date(d.time*1000).toLocaleDateString('zh-TW')},${d.open},${d.high},${d.low},${d.close}`)
  );
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${activeSym.replace('=F','')}_${activePd}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
function exportAllJSON(){
  const blob=new Blob([JSON.stringify({prices,cachedData,exportAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`agriwatch_all_${new Date().toISOString().slice(0,10)}.json`;a.click();
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('zh-TW');
  const etH=(now.getUTCHours()-4+24)%24,isWknd=now.getDay()===0||now.getDay()===6;
  const b=document.getElementById('mkt-b');
  if(!isWknd&&etH>=9&&etH<14){b.textContent='CBOT 交易中';b.className='mkt-b open';}
  else{b.textContent='盤後/休市';b.className='mkt-b closed';}
}

// ══════════════════════════════════════════
// PWA Service Worker 註冊
// ══════════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    // 內嵌 SW 使用 Blob URL
    const swCode = `
const CACHE = 'agriwatch-v4';
const ASSETS = [self.location.href];
self.addEventListener('install', e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
});
self.addEventListener('fetch', e=>{
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      if(res && res.status===200){
        const clone=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
      }
      return res;
    }).catch(()=>caches.match(e.request)))
  );
});
`;
    const blob = new Blob([swCode],{type:'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  });
}
